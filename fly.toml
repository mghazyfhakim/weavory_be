# fly.toml app configuration file generated for weavory-be on 2026-04-19T15:25:31+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'weavory-be'
primary_region = 'sin'

[build]
  [build.args]
    GO_VERSION = '1.25.4'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
